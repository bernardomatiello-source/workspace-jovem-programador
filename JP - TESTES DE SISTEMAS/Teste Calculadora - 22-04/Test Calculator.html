<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Calculator</title>
</head>
<body>
    <div id="model-numbers">
        <input id="number1" type="number" placeholder="Type the first value: ">
        <input id="number2" type="number" placeholder="Type the second value: ">
    </div>

    <div id="model-calculator">
        <button id="sum"> ➕ </button>
        <button id="subtraction"> ➖ </button>
        <button id="division"> ➗ </button>
        <button id="multiply"> ✖️ </button>
    </div>

    <div id="model-result">
        <input id="result" placeholder="Calc Result">
    </div>
    <script src="Test Calculator.js"></script>
</body>
</html>
