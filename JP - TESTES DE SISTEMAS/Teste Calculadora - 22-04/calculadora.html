<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Calculator</title>
    <link rel="stylesheet" href="calculadora.css">
</head>

<body>
    <div class="calc-wrapper">
        <div class="calculator">
            <input type="text" id="result" placeholder="0" readonly>

            <div class="inputs-area">
                <input type="number" id="number1" placeholder="Primeiro número">
                <input type="number" id="number2" placeholder="Segundo número">
            </div>

            <div class="buttons-row">
                <button id="sum">+</button>
                <button id="subtraction">-</button>
                <button id="multiply">×</button>
                <button id="division">÷</button>
            </div>
        </div>
    </div>
    <script src="calculadora.js"></script>
    <script src="calculadora.test.js"></script>
</body>

</html>
