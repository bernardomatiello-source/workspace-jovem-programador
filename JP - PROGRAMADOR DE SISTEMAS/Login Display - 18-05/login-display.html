<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login-display.css">
</head>
<body>
    
    <div class="container">

        <div class="input-container">
            <input type="text" id="user-input" class="user-input" placeholder="Digite o Usuario">
            <input type="text" id="password-input" class="password-input" placeholder="Digite a Senha">
        </div>
        
        <div class="button-container">
            <button id="login-button" class="login-button">Login</button>
        </div>

        <div id="message-count" class="message-count"></div>

    </div>

    <script src="js/login-display.js"></script>
</body>
</html>
