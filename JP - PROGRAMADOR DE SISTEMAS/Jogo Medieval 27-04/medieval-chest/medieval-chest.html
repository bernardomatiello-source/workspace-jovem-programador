<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Chest</title>
</head>

<body>
    <div id="medieval-form">
        <input type="string" id="form-question" placeholder="Digite a Senha do Bau">
        <button id="medieval-button">Enviar</button>
    </div>

    <div id="medieval-result"></div>

    <script>
        const formResponse = document.getElementById('form-question')
        const formResult = document.getElementById('medieval-result')
        const formButton = document.getElementById('medieval-button')

        function verifyForm() {

            const paragrafer = document.createElement('p')
            let response = ((formResponse.value).toString())

            if(response.toLowerCase() === 'ouro') {
                paragrafer.innerText = `Tesouro Liberado`
            } else {
                paragrafer.innerText = `Tente Novamente!`
            }

            formResult.appendChild(paragrafer)
        }

        formButton.addEventListener('click', verifyForm)
    </script>
</body>

</html>
