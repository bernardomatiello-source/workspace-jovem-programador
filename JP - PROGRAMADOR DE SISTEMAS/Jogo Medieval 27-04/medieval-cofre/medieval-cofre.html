<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Cofre</title>
</head>

<body>
    <div id="medieval-form">
        <input type="string" id="form-question" placeholder="Digite a Senha do Cofre">
        <button id="form-button">Enviar</button>
    </div>

    <div id="medieval-result"></div>

    <script>
        const formResponse = document.getElementById('form-question')
        const formButton = document.getElementById('form-button')
        const formResult = document.getElementById('medieval-result')

        function verifyForm() {

            const paragrafer = document.createElement('p')
            let response = ((formResponse.value).toString()).toLowerCase()

            if(!response) {
                paragrafer.innerText = `Digite uma Senha!`
            } else if (response === "1234") {
                paragrafer.innerText = `Cofre Aberto!`
            } else {
                paragrafer.innerText = `Senha Incorreta!`
            }

            formResult.appendChild(paragrafer)
        }

        formButton.addEventListener('click', verifyForm)
    </script>
</body>

</html>
