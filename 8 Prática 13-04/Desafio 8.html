<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Formulário</title>
    <link rel="stylesheet" href="Desafio 8.css">
</head>

<body>
    <div id="formValidate">
        <label for="userLabel">User</label>
        <input type="string" id="form-email" placeholder="Digite seu usuario">
        <div id="inputPassword">
            <label for="passwordLabel">Password</label>
            <input type="password" id="form-password" placeholder="Digite sua senha">
            <button type="button" id="togglePassword"> Mostrar </button>
        </div>
        <button id="form-button"> Validar </button>
        <input type="string" id="form-result" placeholder="Resultado" readonly>
    </div>
    <script src="Desafio 8.js"></script>
</body>

</html>
