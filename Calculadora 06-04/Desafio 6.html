<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="Desafio 6.css">
</head>
<body>
    <div id="calculadora">
        <input type="number" id="valor1" placeholder="Digite o Primeiro Valor">
        <select name="operacao" id="mathOperation">
            <option value="Divisão"> Divisão ➗ </option>
            <option value="Soma"> Soma ➕ </option>
            <option value="Subtração"> Subtração ➖ </option>
            <option value="Vezes"> Vezes ✖️ </option>
        </select>
        <input type="number" id="valor2" placeholder="Digite o Segundo Valor">
        <button id="btn-calculate"> Calcular </button>
        <input type="number" id="mathResult" placeholder="Resultado" readonly>
    </div>
    <script src="Desafio 6.js"></script>
</body>
</html>
