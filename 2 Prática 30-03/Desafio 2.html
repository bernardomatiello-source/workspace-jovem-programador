<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios</title>
</head>
<body>
    <div id="averageGrades">
        <input type="number" id="firstGrade" placeholder="Digite a Primeira Nota">
        <span> + </span>
        <input type="number" id="secondGrade" placeholder="Digite a Segunda Nota">
        <span> + </span>
        <input type="number" id="thirdGrade" placeholder="Digite a Terceira Nota">
        <span> = </span>
        <input type="string" id="halfGrade" placeholder="Média das Notas" readonly>
    </div>
    <br>
    <div id="dolarConversor">
        <input type="number" id="reais" placeholder="Digite o Valor em R$">
        <span> = </span>
        <input type="string" id="dolars" placeholder="Valor em Dolares" readonly>
    </div>
    <br>
    <div id="discount">
        <input type="number" id="productValue" placeholder="Digite o Valor do Produto">
        <span> - </span>
        <input type="number" id="discountPercentage" placeholder="Digite o Desconto em %">
        <span> = </span>
        <input type="string" id="valueWithDiscount" placeholder="Valor com Desconto">
    </div>

    <script src="Desafio 2.js"></script>
</body>
</html>
