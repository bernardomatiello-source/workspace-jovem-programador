<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Desafios</title>
</head>
<body>
    
    <div id="conversor">
        <input id="celsius" type="number" placeholder="Digite os Celsius">
        <span> °C é igual a </span>
        <input type="text" id="fahrenheit" placeholder="Fahrenheit" readonly>
    </div>
    <br>
    <div id="compares">
        <input id="valor1" type="text" placeholder="Digite o Primerio Valor">
        <span> Comparado com </span>
        <input id="valor2" type="text" placeholder="Digite o Segundo Valor">
        <span> = </span>
        <input id="result-compare" type="text" placeholder="Comparação" readonly>
    </div>
    <br>
    <div id="retanguleArea">
        <input type="number" id="height" placeholder="Digite a altura">
        <span> e </span>
        <input type="number" id="width" placeholder="Digite a largura">
        <span> = </span>
        <input type="string" id="area" placeholder="Área do Retangulo">
    </div>

    <script src="Desafio 1.js"></script>
</body>
</html>
